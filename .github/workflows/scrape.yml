name: Scrape Cricheroes

on:
  schedule:
    - cron: '0 3 */3 * *'  # every 3 days at 03:00 UTC
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install system deps for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2

      - name: Install scraper deps
        working-directory: scraper
        run: npm ci

      - name: Run scraper
        working-directory: scraper
        run: node scrape.js

      - name: Validate scrape result
        run: |
          MATCHES=$(node -e "const d=require('./scraper/data.json'); console.log(d.matches?.length||0)")
          echo "Scraped matches: $MATCHES"
          if [ "$MATCHES" -lt "1" ]; then
            echo "❌ Empty result — aborting to protect existing data"
            exit 1
          fi
          echo "✅ Data looks good"

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scraper/data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: auto-update scraped data [skip ci]"
            git push
          fi
